services:
  - type: web
    name: rescuenet-venezuela-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npx prisma migrate deploy && npm run prisma:seed && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ENABLE_PRODUCTION_BOOTSTRAP
        value: "false"
      - key: MAX_BOOTSTRAP_RECORDS
        value: "200"

  - type: web
    name: rescuenet-venezuela-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ENABLE_DEMO_DATA
        value: "false"
      - key: VITE_PUBLIC_WHATSAPP_NUMBER
        value: "12245914415"
